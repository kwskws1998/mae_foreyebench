repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.9.10
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [python, pyi, jupyter]
        args: [--fix]
      # Run import sorting.
      - id: ruff
        types_or: [python, pyi, jupyter]
        args: [--select=I, --fix]
        name: ruff-imports
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi, jupyter]
